name: build desktop app

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.1)'
        required: true
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: bump version in tauri.conf.json
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          sed -i.bak 's/"version": "[^"]*"/"version": "${{ inputs.version }}"/' src-tauri/tauri.conf.json

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install tauri-cli
        run: cargo install tauri-cli --version "^1" --locked

      - name: build app
        run: cargo tauri build ${{ matrix.args }}

      - name: stage artifacts (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-Item target/release/bundle/msi/*.msi  | Copy-Item -Destination dist/sol-vanity-windows.msi
          Get-Item target/release/bundle/nsis/*.exe | Copy-Item -Destination dist/sol-vanity-windows-setup.exe

      - name: stage artifacts (macos)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/sol-vanity-mac.dmg 2>/dev/null || \
          cp target/release/bundle/dmg/*.dmg dist/sol-vanity-mac.dmg 2>/dev/null || true

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sol-vanity-${{ matrix.platform }}
          path: dist/
          if-no-files-found: ignore

      - name: attach to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: Sol Vanity ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          make_latest: true
          files: dist/*
