name: build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install tauri-cli
        run: cargo install tauri-cli --version "^1" --locked

      - name: build app
        run: cargo tauri build ${{ matrix.args }}

      - name: stage artifacts (windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/bundle/msi/*.msi dist/ -ErrorAction SilentlyContinue
          Copy-Item target/release/bundle/nsis/*.exe dist/ -ErrorAction SilentlyContinue

      - name: stage artifacts (macos)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/universal-apple-darwin/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true
          cp target/release/bundle/dmg/*.dmg dist/ 2>/dev/null || true

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sol-vanity-${{ matrix.platform }}
          path: dist/
          if-no-files-found: ignore

      - name: attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
